services:
  - type: web
    name: shifto
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SHIFTO_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: DB_DIR
        value: /data           # persistent disk mount point
    disk:
      name: shifto-data
      mountPath: /data
      sizeGB: 1
